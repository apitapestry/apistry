          x-etl-transforms:
            - source: 'skin_color'
        homeworldPlanetId:
          type: string
          x-etl-transforms:
            - source: 'homeworld'
        films:
          type: array
          items:
            type: string
        filmIds:
          type: array
          items:
            type: string
          x-etl-transforms:
            - source: 'films'
        species:
          type: array
          items:
            type: string
#        characterSpeciesId:
        speciesId:
          type: string
#          x-etl-transforms:
#            - source: 'species'
#            - pick: 'first'
        starships:
          type: array
          items:
            type: string
