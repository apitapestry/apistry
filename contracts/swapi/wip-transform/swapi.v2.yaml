        characterId:
          description: Unique identifier for the character
          type: string
          format: uuid
          readOnly: true
          example: 'a3bb189e-8bf9-3888-9912-ace4e6543002'
          x-insert: uuid
          x-etl-transforms:
            - source: 'personId'
        id:
          description: Person Identifier
          type: string
          readOnly: true
          example: 1
          x-query: optional
          x-query-name-prefix: SwapiV2
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        name:
          type: string
          x-query: optional
          x-query-name-prefix: SwapiV2
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        birthYear:
          type: string
