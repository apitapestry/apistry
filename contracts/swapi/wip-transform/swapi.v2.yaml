components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: '^\d+$'

    CharacterId:
      name: characterId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    FilmId:
      name: filmId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    StarshipId:
      name: starshipId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    VehicleId:
      name: vehicleId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    SpeciesId:
      name: speciesId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PlanetId:
      name: planetId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    NotFound:
      description: Resource not found

  schemas:
    SwapiCharacterV2:
      type: object
      required:
        - name
        - createdDateTime
        - updatedDateTime
