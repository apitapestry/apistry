openapi: 3.0.3
info:
  title: SWAPI (The Star Wars API)
  description: The Star Wars API
  version: 'v2'

servers:
  - url: https://localhost

paths:
  /characters:
    get:
      tags:
        - SWAPI v2
      x-collection: swapi-characters-v2
      summary: List characters
      operationId: getCharacters

      parameters:
        - $ref: '../global/global.models.yaml#/components/parameters/LimitQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OffsetQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OrderQueryOptional'

      responses:
        '200':
          description: A list of Characters
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    $ref: '../global/global.models.yaml#/components/schemas/ContentRange'
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SwapiCharacterV2'
                    minItems: 0
                    maxItems: 10

  /characters/{characterId}:
    get:
      tags:
        - SWAPI v2
      x-collection: swapi-characters-v2
      summary: Get a character
      operationId: getCharacter

      parameters:
        - $ref: '#/components/parameters/CharacterId'

      responses:
        '200':
          description: A person
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapiCharacterV2'
        '404':
          $ref: '#/components/responses/NotFound'

  /films:
    get:
      tags:
        - SWAPI v2
      x-collection: swapi-films-v2
      summary: List films
      operationId: listFilms

      parameters:
        - $ref: '../global/global.models.yaml#/components/parameters/LimitQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OffsetQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OrderQueryOptional'

      responses:
        '200':
          description: A list of Films
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    $ref: '../global/global.models.yaml#/components/schemas/ContentRange'
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SwapiFilmV2'
                    minItems: 0
                    maxItems: 10

  /films/{filmId}:
    get:
      tags:
        - SWAPI v2
      x-collection: swapi-films-v2
      summary: Get a film
      operationId: getFilm

      parameters:
        - $ref: '#/components/parameters/FilmId'

      responses:
        '200':
          description: A film
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapiFilmV2'
        '404':
          $ref: '#/components/responses/NotFound'

  /starships:
    get:
      tags:
        - SWAPI v2
      x-collection: swapi-starships-v2
      summary: List starships
      operationId: listStarships

      parameters:
