components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: '^\d+$'

    IdQueryOptional:
      name: id
      in: query
      required: false
      schema:
        type: string
        pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'

  responses:
    NotFound:
      description: Resource not found

  schemas:
    Pagination:
      type: object
      properties:
        contentRange:
          $ref: '../global/global.models.yaml#/components/schemas/ContentRange'
#        limit:
#          type: integer
#          x-format: '{limit}'
#        prevOffset:
#          type: integer
#          x-format: '{prevOffset}'
#        nextOffset:
#          type: integer
#          x-format: '{nextOffset}'
        count:
          type: integer
          x-format: '{total}'
        next:
          type: string
          format: uri
          x-format: '/people?{nextQuerystring}'
        previous:
          type: string
          format: uri
          x-format: '/people?{previousQuerystring}'

    SwapiPersonV1:
      type: object
      required:
        - name
        - url
        - created
        - edited
      properties:
        personId:
          description: Unique identifier for the person
          type: string
          format: uuid
          readOnly: true
          example: 'a3bb189e-8bf9-3888-9912-ace4e6543002'
          x-insert: uuid
        id:
          description: Person Identifier
          type: string
          readOnly: true
          example: 1
          x-etl-transforms:
            - source: url
            - apply-pattern: '^.*/people/(\d+)/?$'
          x-query: optional
          x-query-name-prefix: SwapiV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        name:
          type: string
          x-query: optional
          x-query-name-prefix: SwapiV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        birth_year:
