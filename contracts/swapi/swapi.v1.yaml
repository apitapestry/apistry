openapi: 3.0.3
info:
  description: The Star Wars API
  title: SWAPI (The Star Wars API)
  version: 'v1'

servers:
  - url: https://localhost

paths:
  /people:
    get:
      tags:
        - SWAPI v1
      x-collection: swapi-people-v1
      summary: List people
      operationId: getPersons

      parameters:
        - $ref: '#/components/parameters/IdQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/LimitQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OffsetQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OrderQueryOptional'

      responses:
        '200':
          description: A list of People
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SwapiPersonV1'
                    minItems: 0
                    maxItems: 10

  /people/{id}:
    get:
      tags:
        - SWAPI v1
      x-collection: swapi-people-v1
      summary: Get a person
      operationId: getPerson

      parameters:
        - $ref: '#/components/parameters/Id'

      responses:
        '200':
          description: A person
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapiPersonV1'
        '404':
          $ref: '#/components/responses/NotFound'

  /films:
    get:
      tags:
        - SWAPI v1
      x-collection: swapi-films-v1
      summary: List films
      operationId: listFilms

      parameters:
        - $ref: '#/components/parameters/IdQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/LimitQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OffsetQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OrderQueryOptional'

      responses:
        '200':
          description: A list of Films
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SwapiFilmV1'
                    minItems: 0
                    maxItems: 10

  /films/{id}:
    get:
      tags:
        - SWAPI v1
      x-collection: swapi-films-v1
      summary: Get a film
      operationId: getFilm
      parameters:
