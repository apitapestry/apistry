          x-query: optional
          x-query-name-prefix: SwapiV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        homeworld:
          type: string
          format: uri
          x-etl-transforms:
            - apply-pattern: '^.*/(\d+)/?$'
        films:
          type: array
          items:
            type: string
            format: uri
          x-etl-transforms:
#            - source: films
            - map-pattern: '^.*/(\d+)/?$'
        species:
          type: array
          items:
            type: string
            format: uri
          x-etl-transforms:
            - map-pattern: '^.*/(\d+)/?$'
        starships:
