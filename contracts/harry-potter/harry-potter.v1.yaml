components:
  parameters:
    MagicBookId:
      name: magicBookId
      in: path
      description: The identifier of the book.
      required: true
      schema:
        type: string
        format: uuid
        example: c1637a49-3cc8-4285-93a1-28e6579f1f20

    ChapterId:
      name: chapterId
      in: path
      description: The identifier of the chapter.
      required: true
      schema:
        type: string
        format: uuid
        example: c1637a49-3cc8-4285-93a1-28e6579f1f20

    HPCharacterId:
      name: characterId
      in: path
      description: The identifier of the character.
      required: true
      schema:
        type: string
        format: uuid
        example: c1637a49-3cc8-4285-93a1-28e6579f1f20

    HPMovieId:
      name: movieId
      in: path
      description: The identifier of the movie.
      required: true
      schema:
        type: string
        format: uuid
        example: c1637a49-3cc8-4285-93a1-28e6579f1f20

    PotionId:
      name: potionId
      in: path
      description: The identifier of the potion.
      required: true
      schema:
        type: string
        format: uuid
        example: c1637a49-3cc8-4285-93a1-28e6579f1f20

    SpellId:
      name: spellId
      in: path
      description: The identifier of the spell.
      required: true
      schema:
        type: string
        format: uuid
        example: c1637a49-3cc8-4285-93a1-28e6579f1f20

  schemas:
    MagicBook:
      description: Representation of a book.
      type: object
      properties:
        magicBookId:
          description: The unique identifier of the book.
          type: string
          format: uuid
          example: c1637a49-3cc8-4285-93a1-28e6579f1f20
          x-etl-transforms:
            - source: 'id'
#        slug:
#          type: string
#          example: harry-potter-and-the-philosopher-s-stone
#          x-etl-transforms:
#            - source: 'attributes.slug'
        title:
          type: string
          example: Harry Potter and the Philosopher's Stone
          x-etl-transforms:
            - source: 'attributes.title'
          x-query: optional
          x-query-name-prefix: HpV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        summary:
          type: string
          x-etl-transforms:
            - source: 'attributes.summary'
          x-query: optional
          x-query-name-prefix: HpV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        author:
          type: string
          x-etl-transforms:
            - source: 'attributes.author'
          x-query: optional
          x-query-name-prefix: HpV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        releaseDate:
          type: string
          format: date
          x-etl-transforms:
            - source: 'attributes.release_date'
          x-query: optional
          x-query-name-prefix: HpV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        dedication:
          type: string
          x-etl-transforms:
            - source: 'attributes.dedication'
          x-query: optional
          x-query-name-prefix: HpV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        pages:
          type: integer
          x-etl-transforms:
            - source: 'attributes.pages'
          x-query: optional
          x-query-name-prefix: HpV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        cover:
          type: string
          format: uri
          x-etl-transforms:
            - source: 'attributes.cover'
          x-query: optional
          x-query-name-prefix: HpV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        wiki:
          type: string
          format: uri
          x-etl-transforms:
            - source: 'attributes.wiki'
          x-query: optional
          x-query-name-prefix: HpV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        chapters:
          type: array
          items:
            description: The unique identifier of the chapter.
            type: string
            format: uuid
          uniqueItems: true
#          x-etl-transforms:
#            - source: 'relationships.chapters.data'
          x-query: optional
          x-query-name-prefix: HpV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'

    Chapter:
      description: Representation of a chapter.
      type: object
      properties:
        chapterId:
          description: The unique identifier of the chapter
          type: string
          format: uuid
          example: c1637a49-3cc8-4285-93a1-28e6579f1f20
          x-etl-transforms:
            - source: 'id'
        magicBookId:
          description: The unique identifier of the magic book
          type: string
          format: uuid
          example: c1637a49-3cc8-4285-93a1-28e6579f1f20
          x-etl-transforms:
            - source: 'relationships.book.data.id'
#            - pick: 'first'
        title:
          type: string
          example: The Boy Who Lived
          x-etl-transforms:
            - source: 'attributes.title'
          x-query: optional
          x-query-name-prefix: HpV1
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        summary:
