openapi: 3.0.3
info:
  title: Harry Potter
  version: v1
  description: Harry Potter API, providing information about books, characters, movies, potions and spells of the Harry Potter universe.

servers:
  - url: https://api.potterdb.com
    description: Production server

paths:
  /magic-books:
    get:
      summary: Retrieves a list of books
      tags:
        - books
      x-collection: harry-potter-books-v1
      description: Retrieves a list of books
      operationId: getBooks

      parameters:
        - $ref: '../global/global.models.yaml#/components/parameters/LimitQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OffsetQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OrderQueryOptional'

      responses:
        '200':
          description: A list of books
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    $ref: '../global/global.models.yaml#/components/schemas/ContentRange'
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/MagicBook'

  /magic-books/{magicBookId}:
    get:
      summary: Retrieves a book
      tags:
        - books
      x-collection: harry-potter-books-v1
      description: Retrieves a specific book by id
      operationId: getBook

      parameters:
        - $ref: '#/components/parameters/MagicBookId'

      responses:
        '200':
          description: A single book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MagicBook'

        '404':
          $ref: '../global/global.models.yaml#/components/responses/NotFound'

  /chapters:
    get:
      summary: Retrieves a list of chapters
      tags:
        - chapters
      x-collection: harry-potter-chapters-v1
      description: Retrieves a list of chapters
      operationId: getChapters

      parameters:
        - $ref: '../global/global.models.yaml#/components/parameters/LimitQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OffsetQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OrderQueryOptional'

      responses:
        '200':
          description: A list of chapters
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    $ref: '../global/global.models.yaml#/components/schemas/ContentRange'
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chapter'

  /chapters/{chapterId}:
    get:
      summary: Retrieves a character
      tags:
        - chapters
      x-collection: harry-potter-chapters-v1
      description: Retrieves a specific chapter
      operationId: getChapter

      parameters:
        - $ref: '#/components/parameters/ChapterId'

      responses:
        '200':
          description: A single character
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chapter'
        '404':
