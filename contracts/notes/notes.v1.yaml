openapi: 3.0.3
info:
  title: Notes
  description: API for managing and searching personal reminders including notes, preferences and tasks.
  version: v1

x-allowed-methods:
  - get

servers:
  - url: 'https://myserver.amazonaws.com'

security:
  - bearerAuth: []

paths:
  /notes/{noteId}:
    get:
      tags: [Notes]
      x-collection: notes
      summary: Get a Note
      description: Get a Note
      operationId: getNote

      parameters:
        - $ref: '#/components/parameters/NoteId'

      responses:
        '200':
          description: A note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'

  /notes:
    get:
      tags: [Notes]
      x-collection: notes
      summary: List user notes
      description: List user notes
      operationId: getNotes

      parameters:
        - $ref: '#/components/parameters/NoteTypeQueryOptional'
        - $ref: '#/components/parameters/NoteIdsQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/LimitQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OffsetQueryOptional'
        - $ref: '../global/global.models.yaml#/components/parameters/OrderQueryOptional'

      responses:
        '200':
          description: A list of notes
            The response also includes a Content-Range header in the format 'items start-end/total', which provides the total record count.
          headers:
            Content-Range:
              $ref: '../global/global.models.yaml#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: object
                readOnly: true
                properties:
                  contentRange:
                    $ref: '../global/global.models.yaml#/components/schemas/ContentRange'
                  results:
                    description: The list of resources
                    type: array
                    items:
                      $ref: '#/components/schemas/Note'
                    minItems: 0
                    maxItems: 50

    post:
      tags: [Notes]
      x-collection: notes
      description: Create multiple note records
      summary: Create notes in bulk
      operationId: createNotes
      security:
        - apiKey: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Note'
              minItems: 1
              maxItems: 50

      responses:
        '201':
          description: Notes created successfully in bulk
          headers:
            Content-Range:
              $ref: '../global/global.models.yaml#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: object
                readOnly: true
                properties:
                  contentRange:
                    $ref: '../global/global.models.yaml#/components/schemas/ContentRange'
                  results:
                    description: The list of resources
                    type: array
                    items:
                      $ref: '#/components/schemas/Note'
                    minItems: 0
                    maxItems: 50

    patch:
      tags: [Notes]
      x-collection: notes
      description: Update multiple notes in your personal library.
        Only need to provide those fields that need to be updated.
        NoteType valid values are 'UpdatePreference', 'UpdateSimple', 'UpdateTask'.
      summary: Update notes
      operationId: updateNotes
      security:
        - apiKey: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Note'
              minItems: 1
              maxItems: 50

      responses:
        '200':
          description: Updated successfully
          headers:
            Content-Range:
              $ref: '../global/global.models.yaml#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: object
                readOnly: true
                properties:
                  contentRange:
                    $ref: '../global/global.models.yaml#/components/schemas/ContentRange'
                  results:
                    description: The list of resources
                    type: array
                    items:
                      $ref: '#/components/schemas/Note'
                    minItems: 0
                    maxItems: 50

    delete:
      tags: [Notes]
      x-collection: notes
      description: Remove a note from your settings
      summary: Delete notes
      operationId: deleteNotes
      security:
        - apiKey: []

      parameters:
        - $ref: '#/components/parameters/NoteTypeQueryOptional'
        - $ref: '#/components/parameters/NotesCategoryQueryOptional'
        - $ref: '#/components/parameters/NoteIdsQueryOptional'
        - $ref: '#/components/parameters/NoteIdQueryOptional'
        - $ref: '#/components/parameters/NotesDueDateTimeQueryOptional'

      responses:
        '200':
          description: A list of notes
            The response also includes a Content-Range header in the format 'items start-end/total', which provides the total record count.
          headers:
            Content-Range:
              $ref: '../global/global.models.yaml#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: object
                readOnly: true
                properties:
                  contentRange:
                    $ref: '../global/global.models.yaml#/components/schemas/ContentRange'
                  results:
                    description: The list of resources
                    type: array
                    items:
                      $ref: '#/components/schemas/Note'
                    minItems: 0
                    maxItems: 50

