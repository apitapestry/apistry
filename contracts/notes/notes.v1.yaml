components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    NoteTypeQueryOptional:
      description: Resource type
      name: noteType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/NoteType'

    NoteIdsQueryOptional:
      description: Unique identifier for the note.
      name: noteIds
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          format: uuid

    NoteIdQueryOptional:
      description: Unique identifier for the note.
      name: noteId
      in: query
      required: false
      schema:
        type: string
        format: uuid

    NoteId:
      description: Unique identifier for the note.
      name: noteId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    NotesDueDateTimeQueryOptional:
      description: Due date for the reminder (ISO 8601 format). Only applicable for tasks note.
      name: dueDateTime
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$

    NotesCategoryQueryOptional:
      name: noteCategory
      in: query
      description: Filter by category (supports wildcard and partial matches).
      required: false
      schema:
        type: string
        pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        minLength: 1
        maxLength: 40

  schemas:
    Note:
      oneOf:
        - $ref: '#/components/schemas/SimpleNote'
        - $ref: '#/components/schemas/Preference'
        - $ref: '#/components/schemas/Task'
      discriminator:
        propertyName: noteType

    Preference:
      description: A user preference or configuration setting
      type: object
      x-context:
        required:
          post: [noteCategory, name, value]
          put: [noteCategory, name, value]
          delete: [noteId]
          patch: [noteId]
        prohibited:
          post: [noteId]
          put: [noteId]
      required:
        - noteType
      properties:
        noteId:
          $ref: '#/components/schemas/NoteId'
        noteType:
          type: string
          enum: ['Preference']
        noteCategory:
          description: The category or group this preference belongs to
          type: string
          pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?-]+$'
          minLength: 1
          maxLength: 40
        name:
          description: The name of the preference setting
          type: string
          pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?-]+$'
          minLength: 1
          maxLength: 40
          x-query: optional
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        value:
          description: The new value for this preference
          type: string
          minLength: 1
          maxLength: 200
          x-query: optional
          x-query-pattern: '^(eq\.|neq\.)[A-Za-z0-9._,+:''|&@\s()#!?-]+$|^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$|^isNull$'
        isPii:
          description: Whether this preference contains personally noteIdentifiable information
          type: boolean
          x-query: optional
          x-query-pattern: '^(eq\.|neq\.)(true|false)$|^(true|false)$|^isNull$'
        expiresAtDateTime:
          description: When this preference should expire (if applicable)
          type: string
          format: date-time
          x-query: optional
          x-query-pattern: '^(gt\.|lt\.|gte\.|lte\.|eq\.|neq\.)[0-9T:\-Z]+$|^[0-9T:\-Z]+$|^isNull$'
        createdAtDateTime:
          description: When this note was created
          type: string
          format: date-time
        updatedAtDateTime:
          description: When this note was updated
          type: string
          format: date-time

    SimpleNote:
      description: A user note or configuration setting
      type: object
      x-context:
        required:
          post: [noteCategory, subject, note]
          put: [noteCategory, subject, note]
          delete: [noteId]
          patch: [noteId]
        prohibited:
          post: [noteId]
          put: [noteId]
      required:
        - noteType
      properties:
        noteId:
          $ref: '#/components/schemas/NoteId'
        noteType:
          type: string
          enum: ['Simple']
        noteCategory:
          description: The category or group this preference belongs to
          type: string
          pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?-]+$'
          minLength: 1
          maxLength: 40
        subject:
          description: The name of the note setting
          type: string
          pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?-]+$'
          minLength: 1
          maxLength: 40
          x-query: optional
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        note:
          description: The new value for this note
          type: string
          pattern: '^[A-Za-z0-9._,+:;''|→/#%$&@\s()#!?*-]+$'
          minLength: 1
          maxLength: 500
          x-query: optional
          x-query-pattern: '^[A-Za-z0-9._,+:;''|→/#%$&@\s()#!?*-]+$'
        createdAtDateTime:
          description: When this note was created
          type: string
          format: date-time
        updatedAtDateTime:
          description: When this note was updated
          type: string
          format: date-time

    Task:
      description: List of tasks - can be added to manually by user or is populated by pulling the calendar events.
      type: object
      x-context:
        required:
          post: [noteType, dueDateTime, title]
          put: [noteId, noteType, dueDateTime, title]
          delete: [noteId]
          patch: [noteId]
        prohibited:
          post: [noteId]
      required:
        - noteType
      properties:
        noteId:
          $ref: '#/components/schemas/NoteId'
        noteType:
          type: string
          enum: ['Task']
        noteCategory:
          description: The category or group this preference belongs to
          type: string
          pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?-]+$'
          minLength: 1
          maxLength: 40
          x-query: optional
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        providerId:
          description: External provider noteIdentifier
          type: string
        providerTaskListId:
          description: External provider task list ID
          type: string
        parentId:
          description: Parent task UUID for subtasks
          type: string
          format: uuid
          nullable: true
          x-query: optional
        dueDateTime:
          description: The due date and time for the task
          type: string
          format: date-time
          nullable: true
          x-query: optional
        isCompleted:
          description: Whether the task is completed
          type: boolean
          default: false
          x-query: optional
        taskTitle:
          description: The title of the task
          type: string
          maxLength: 255
          x-query: optional
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        course:
          description: The course or project this task is associated with
          type: string
          maxLength: 255
          x-query: optional
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        calendarSource:
          description: which calendar this task was sourced from (if any)
          type: string
          maxLength: 255
          x-query: optional
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        notes:
          description: Additional notes for the task
          type: string
          maxLength: 500
          x-query: optional
          x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'
        url:
          description: The URL associated with the task
          type: string
          maxLength: 500
          x-query: optional
        createdAtDateTime:
          description: When this note was created
          type: string
          format: date-time
        updatedAtDateTime:
          description: When this note was updated
          type: string
          format: date-time

    NoteType:
      description: The type of resource this is
      type: string
      enum:
        - Simple
        - Preference
        - Task

    NoteId:
      description: Unique noteIdentifier for this resource
      type: string
      format: uuid
      x-query: optional
      x-primary-key: true
      x-query-pattern: '^(eq\.|neq\.)[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$|^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$|^isNull$'
