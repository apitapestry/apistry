openapi: 3.0.3
info:
  title: Hello world
  description: Hello world example API
  version: v1

servers:
  - url: 'https://1wz48u09w6.execute-api.us-west-1.amazonaws.com'

security:
  - bearerAuth: []

paths:
  /messages:
    get:
      tags: [Hello]
      summary: Hello
      description: Hello
      operationId: getMessages

      parameters:
        - $ref: '#/components/parameters/MessageQueryOptional'
#        - $ref: '#/components/parameters/OrderQueryOptional'
#        - $ref: '#/components/parameters/OffsetQueryOptional'
#        - $ref: '#/components/parameters/LimitQueryOptional'

      responses:
        '200':
          description: A list of audiobooks
          headers:
            Content-Range:
              $ref: '../global/global.models.yaml#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
                minItems: 0
                maxItems: 95

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    LimitQueryOptional:
      description: Maximum number of items to return per page
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 50

    OffsetQueryOptional:
      description: Number of items to skip for pagination
      in: query
      name: offset
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

    OrderQueryOptional:
      description: Field to sort results by. Format is 'field_name.asc' or 'field_name.desc'
      in: query
      name: order
      required: false
      schema:
        type: string
        pattern: '^[a-z0-9_]+\\.(asc|desc)$'
        minLength: 6
        maxLength: 40
        default: 'title.asc'
        example: 'title.asc'

    MessageQueryOptional:
      description: Filter by provider source/platform
      in: query
      name: message
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 200
      example: netflix

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Resource not found

  schemas:
    Message:
      description: An audiobook in your personal library
      type: object
      required: [message_id]
      properties:
        message_id:
          description: Unique identifier for this audiobook
          type: string
          format: uuid
        category:
          description: Unique identifier from the content provider
          type: string
          minLength: 1
          maxLength: 64
        message:
          description: The service or platform where this audiobook was obtained
          type: string
