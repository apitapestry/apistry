    CarStatus:
      description: Current availability status
      type: string
      enum: [available, sold, deleted, reserved, pending, maintenance]
      example: "available"
      readOnly: true
      x-insert: "pending"
      x-query: optional
      x-query-name-prefix: Cars
      x-query-pattern: '^[A-Za-z0-9._,+:''|&@\s()#!?*-]+$'

    Event:
      type: object
      additionalProperties: false
      properties:
        eventId:
          description: Unique Event ID
          type: string
          format: uuid
          readOnly: true
          x-insert: uuid
        eventDate:
          description: Date of the event
          type: string
          format: date
          example: "2024-05-10"
        eventType:
          description: Type of event
          type: string
          example: "Accident"
        description:
          description: Details about the event
          type: string
          nullable: true
          example: "Rear-ended at a stoplight, minor damage to bumper"

    CarUpdate:
      description: Schema for updating an existing car (all fields optional)
      type: object
      properties:
        carId:
          type: string
          format: uuid
          readOnly: true # used as key for update. Only needed for a bulk update
        color:
          description: Exterior color
          type: string
          minLength: 1
          maxLength: 30
          example: "Silver"
          nullable: true
        mileage:
          description: Current odometer reading in miles
          type: integer
          minimum: 0
          nullable: true
          example: 15234
        price:
          description: List price in USD
          type: number
          minimum: 0
          example: 28500.00
        features:
          description: List of features and options
          type: array
          items:
            type: string
          maxItems: 50
          example: ["Backup Camera", "Bluetooth", "Cruise Control", "Leather Seats"]
        description:
          description: Additional notes or description
          type: string
          minLength: 2
          maxLength: 1000
          example: "Well-maintained, single owner, complete service history"
        images:
          description: URLs to car images
          type: array
          items:
            type: string
          maxItems: 20
          example: ["https://example.com/images/car1.jpg", "https://example.com/images/car2.jpg"]
