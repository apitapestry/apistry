openapi: 3.0.3
info:
  title: Utility Endpoints
  description: Utility endpoints
  version: v1

servers:
  - url: 'https://myserver.amazonaws.com'

security:
  - bearerAuth: []

paths:
  /orchestration-actions:
    get:
      tags: [Utilities]
      summary: Orchestration endpoint
      description: Provides list of Orchestration actions
      operationId: getOrchestrationActions

      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrchestrationAction'

  /health:
    get:
      tags: [Utilities]
      summary: Health check endpoint
      description: Returns the health status of the Service.
      operationId: getHealth

      responses:
        '200':
          description: Health check successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy

  /ready:
    get:
      tags: [Utilities]
      summary: Readiness check endpoint
      description: Returns the ready status of the Service
      operationId: getReady

      responses:
        '200':
          description: Ready check successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready

  /metrics:
    get:
      tags: [Utilities]
      summary: Metrics endpoint
      description: Returns the metrics for the Service
      operationId: getMetrics

      responses:
        '200':
          description: Metrics successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready

