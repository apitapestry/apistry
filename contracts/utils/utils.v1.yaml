components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ResourceTypeQueryOptional:
      description: Resource type
      name: resourceType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/ResourceType'

    MethodQueryOptional:
      description: Resource type
      name: method
      in: query
      required: false
      schema:
        type: string
        enum:
          - query
          - post
          - put
          - patch
          - delete

  schemas:
    OrchestrationAction:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        params:
          type: array
          items:
            $ref: '#/components/schemas/ActionParameter'

    ActionParameter:
      type: object
      properties:
        name:
          type: string
          description: Parameter name
        type:
          type: string
          description: Parameter type (e.g., "string", "object", "boolean")
        required:
          type: boolean
          description: Whether the parameter is required
        description:
          type: string
          description: Description of the parameter
        enum:
          type: array
          items:
            type: string
          description: Allowed values if the parameter is an enum

    ResourceType:
      description: The type of resource this is
      type: string
      enum:
        - Book
        - Calendar
        - Note
        - Preference
        - Task
        - Video

    Schema:
      type: object
      properties:
        resourceType:
          type: string
        propertyName:
          type: string
        post:
          type: string
        put:
          type: string
        patch:
          type: string
        delete:
          type: string
        query:
          type: string
        queryPattern:
          type: string
        primaryKey:
          type: string
