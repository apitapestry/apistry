name: Docker

on:
  push:
    branches:
      - main
    tags:
      - 'release-*'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: dockerfile
        run: |
          if [ -f image/Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No image/Dockerfile found; skipping Docker image publish."
          fi

      - name: Set up Node.js
        if: steps.dockerfile.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build application
        if: steps.dockerfile.outputs.exists == 'true'
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release image tags
        if: steps.dockerfile.outputs.exists == 'true' && startsWith(github.ref, 'refs/tags/release-')
        id: release-tags
        run: |
          VERSION="${GITHUB_REF_NAME#release-}"
          {
            echo 'tags<<EOF'
            echo "${IMAGE_NAME}:${VERSION}"
            echo "${IMAGE_NAME}:latest"
            echo "${IMAGE_NAME}:${GITHUB_SHA}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push branch image
        if: steps.dockerfile.outputs.exists == 'true' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./image/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push release image
        if: steps.dockerfile.outputs.exists == 'true' && startsWith(github.ref, 'refs/tags/release-')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./image/Dockerfile
          push: true
          tags: ${{ steps.release-tags.outputs.tags }}
