description: >
  Ingests SWAPI data, normalizes it using the OpenAPI contract,
  applies unit conversions, and writes normalized records.

#  https://swapi.py4e.com/ 87
#  https://swapi.tech/ 82
#  https://swapi.info/ 82
#  https://swapi-node.vercel.app/ 82
#  https://swapi.dev 82
#  https://swapi.info 82
extract:
  description: Extracts data from an api source
  isEnabled: false
  output-path: ./data//swapi/extract
  naming-strategy: '{resource}.json'
  pagination-strategy: swapi
  unwrap-property: results
  actions:
    - resource: swapi-people-v1
      url: https://swapi.py4e.com/api/people/
    - resource: swapi-planets-v1
      url: https://swapi.py4e.com/api/planets/
    - resource: swapi-films-v1
      url: https://swapi.py4e.com/api/films/
    - resource: swapi-species-v1
      url: https://swapi.py4e.com/api/species/
    - resource: swapi-vehicles-v1
      url: https://swapi.py4e.com/api/vehicles/
    - resource: swapi-starships-v1
      url: https://swapi.py4e.com/api/starships/

normalize:
  description: Normalizes SWAPI data according to OpenAPI contracts. if output is not provided, input name will be used.
  isEnabled: false
  contractDirectory: ./docs/contracts
  sourceDirectory: ./data/swapi/extract
  outputDirectory: ./data/swapi/normalize
  filename-strategy: '{collection}.json'
  actions:
  - contract: swapi.v1.yaml
    collection: swapi-people-v1
    schema: SwapiPersonV1
  - contract: swapi.v1.yaml
    collection: swapi-films-v1
    schema: SwapiFilmV1
  - contract: swapi.v1.yaml
    collection: swapi-planets-v1
    schema: SwapiPlanetV1
  - contract: swapi.v1.yaml
    collection: swapi-species-v1
    schema: SwapiSpeciesV1
  - contract: swapi.v1.yaml
    collection: swapi-starships-v1
    schema: SwapiStarshipV1
  - contract: swapi.v1.yaml
    collection: swapi-vehicles-v1
    schema: SwapiVehicleV1

load:
  description: compare file results with db and upsert new/updated records
  isEnabled: false
  sourceDirectory: ./data/swapi/normalize
  filename-strategy: '{collection}.json'
  collections:
  - people
#  - movies
#  - planets
#  - species-types
#  - starships
#  - vehicles
