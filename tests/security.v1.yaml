openapi: 3.0.3
info:
  title: Security Demo Endpoints
  description: Endpoints used to validate demo security enforcement.
  version: v1
servers:
  - url: https://myserver.amazonaws.com
paths:
  /v1/health:
    get:
      tags:
        - Utilities
      summary: Health check endpoint
      operationId: getHealth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Health check successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /v1/ready:
    get:
      tags:
        - Utilities
      summary: Readiness check endpoint
      operationId: getReady
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: Ready check successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /v1/metrics:
    get:
      tags:
        - Utilities
      summary: Metrics endpoint
      operationId: getMetrics
      responses:
        '200':
          description: Metrics successful
          content:
            text/plain:
              schema:
                type: string
  /v1/orchestration-actions:
    get:
      tags:
        - Utilities
      summary: Orchestration endpoint
      operationId: getOrchestrationActions
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrchestrationAction'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    ActionParameter:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        required:
          type: boolean
        description:
          type: string
        enum:
          type: array
          items:
            type: string
    OrchestrationAction:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        params:
          type: array
          items:
            $ref: '#/components/schemas/ActionParameter'

