name: apistry

services:
  apistry:
    build:
      context: ..
      dockerfile: image/Dockerfile
    image: apistry:local
    container_name: apistry
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APISTRY_HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      APISTRY_CONFIG_PATH: ${APISTRY_CONFIG_PATH:-/home/node/site/config.yml}
      API_KEY: ${API_KEY:-}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-}
    volumes:
      - ${APISTRY_SITE_DIR:-.}:/home/node/site:ro
      - apistry-data:/app/data

volumes:
  apistry-data:
