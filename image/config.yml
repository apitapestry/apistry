# Basic container config. The Docker image includes this file at
# /home/node/site/config.yml. Docker Compose can override the mounted site
# directory with APISTRY_SITE_DIR and the config path with APISTRY_CONFIG_PATH.

server:
  host: 0.0.0.0
  port: 3000
  serviceName: APIstry
  serviceDescription: >
    APIstry provides functional APIs directly from OpenAPI specifications
    without writing any code.
  swaggerUiEnabled: true

contracts:
  path: /app/contracts

database:
  connection: sqlite:///app/data/sqlite.db

logging:
  level: info
  pretty: false
  redact:
    - req.headers.authorization
    - req.headers.cookie

cors:
  enabled: true
  origins: true
