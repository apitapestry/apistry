components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d+$
    CharacterId:
      name: characterId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FilmId:
      name: filmId
      in: path
      required: true
