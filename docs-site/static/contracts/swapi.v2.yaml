        - $ref: '#/components/parameters/SwapiV2MassQueryOptional'
        - $ref: '#/components/parameters/SwapiV2SkinColorQueryOptional'
      responses:
        '200':
          description: A list of Characters
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    description: The range of items returned and total count
                    type: string
                    x-format: items {start}-{end}/{total}
                    example: items 0-24/100
                    x-ignore-merge: true
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SwapiCharacterV2'
                    minItems: 0
                    maxItems: 10
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized search request.
        '403':
          description: Forbidden - The request is understood but access is not permitted.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Too Many Requests
        '500':
          $ref: '#/components/responses/InternalServerError'
