openapi: 3.0.3
info:
  title: Harry Potter
  version: v1
  description: Harry Potter API, providing information about books, characters, movies, potions and spells of the Harry Potter universe.
  contact:
    email: API-Gov-Team@gmail.com
    name: acme API Gov Team
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://developer.acme.com/terms/
servers:
  - url: https://api.potterdb.com
    description: Production server
paths:
  /v1/magic-books:
    get:
      summary: Retrieves a list of books
      tags:
        - books
      x-collection: harry-potter-books-v1
      description: Retrieves a list of books
      operationId: getBooks
      parameters:
        - $ref: '#/components/parameters/LimitQueryOptional'
        - $ref: '#/components/parameters/OffsetQueryOptional'
        - $ref: '#/components/parameters/OrderQueryOptional'
        - $ref: '#/components/parameters/HpV1TitleQueryOptional'
        - $ref: '#/components/parameters/HpV1SummaryQueryOptional'
        - $ref: '#/components/parameters/HpV1AuthorQueryOptional'
        - $ref: '#/components/parameters/HpV1ReleaseDateQueryOptional'
        - $ref: '#/components/parameters/HpV1DedicationQueryOptional'
        - $ref: '#/components/parameters/HpV1PagesQueryOptional'
        - $ref: '#/components/parameters/HpV1CoverQueryOptional'
        - $ref: '#/components/parameters/HpV1WikiQueryOptional'
        - $ref: '#/components/parameters/HpV1ChaptersQueryOptional'
      responses:
        '200':
          description: A list of books
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    description: The range of items returned and total count
                    type: string
                    x-format: items {start}-{end}/{total}
                    example: items 0-24/100
                    x-ignore-merge: true
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/MagicBook'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized search request.
        '403':
          description: Forbidden - The request is understood but access is not permitted.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Too Many Requests
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/magic-books/{magicBookId}:
