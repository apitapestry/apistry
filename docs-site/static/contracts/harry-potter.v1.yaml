components:
  parameters:
    MagicBookId:
      name: magicBookId
      in: path
      description: The identifier of the book.
      required: true
      schema:
        type: string
        format: uuid
        example: c1637a49-3cc8-4285-93a1-28e6579f1f20
    ChapterId:
      name: chapterId
      in: path
      description: The identifier of the chapter.
      required: true
      schema:
        type: string
        format: uuid
        example: c1637a49-3cc8-4285-93a1-28e6579f1f20
    HPCharacterId:
      name: characterId
      in: path
      description: The identifier of the character.
      required: true
      schema:
        type: string
        format: uuid
        example: c1637a49-3cc8-4285-93a1-28e6579f1f20
    HPMovieId:
      name: movieId
      in: path
      description: The identifier of the movie.
      required: true
      schema:
        type: string
        format: uuid
        example: c1637a49-3cc8-4285-93a1-28e6579f1f20
    PotionId:
      name: potionId
      in: path
      description: The identifier of the potion.
      required: true
      schema:
        type: string
        format: uuid
        example: c1637a49-3cc8-4285-93a1-28e6579f1f20
    SpellId:
      name: spellId
      in: path
      description: The identifier of the spell.
      required: true
      schema:
        type: string
        format: uuid
        example: c1637a49-3cc8-4285-93a1-28e6579f1f20
    LimitQueryOptional:
      description: Specifies the number(limit) of results to provide in a single response.
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
        x-ignore-merge: true
    OffsetQueryOptional:
      description: Specify the page offset this request is to provide.
      in: query
      name: offset
      schema:
        type: integer
        default: 0
        minimum: 0
        x-ignore-merge: true
    OrderQueryOptional:
      name: order
      in: query
      description: Sort order for the results (e.g., order=price.asc or order=year.desc)
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9_]+\.(asc|desc)$
        x-ignore-merge: true
      example: price.asc
    HpV1TitleQueryOptional:
      name: title
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
    HpV1SummaryQueryOptional:
      name: summary
      in: query
      required: false
      schema:
        type: string
