openapi: 3.0.3
info:
  title: Books
  description: Books
  version: v1
  contact:
    email: API-Gov-Team@gmail.com
    name: acme API Gov Team
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://developer.acme.com/terms/
servers:
  - url: https://localhost:3000
security:
  - bearerAuth: []
paths:
  /v1/books/{bookId}:
    get:
      tags:
        - Books
      x-collection: books
      summary: Get book
      description: Get book
      operationId: getBook
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: A book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized search request.
        '403':
          description: Forbidden - The request is understood but access is not permitted.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Too Many Requests
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/books:
    get:
      tags:
        - Books
      x-collection: books
      summary: List books
      description: List books
      operationId: getBooks
      parameters:
        - $ref: '#/components/parameters/BookIdsQueryOptional'
        - $ref: '#/components/parameters/LimitQueryOptional'
        - $ref: '#/components/parameters/OffsetQueryOptional'
        - $ref: '#/components/parameters/OrderQueryOptional'
        - $ref: '#/components/parameters/BookIdQueryOptional'
        - $ref: '#/components/parameters/BookUserRatingQueryOptional'
        - $ref: '#/components/parameters/BookIsbnIdQueryOptional'
        - $ref: '#/components/parameters/BookTitleQueryOptional'
        - $ref: '#/components/parameters/BookGenresQueryOptional'
        - $ref: '#/components/parameters/BookAuthorQueryOptional'
        - $ref: '#/components/parameters/BookNarratorQueryOptional'
        - $ref: '#/components/parameters/BookSeriesNameQueryOptional'
        - $ref: '#/components/parameters/BookNumBooksInSeriesQueryOptional'
        - $ref: '#/components/parameters/BookBookNumInSeriesQueryOptional'
        - $ref: '#/components/parameters/BookAddedAtDateTimeQueryOptional'
        - $ref: '#/components/parameters/BookUpdatedAtDateTimeQueryOptional'
      responses:
        '200':
          description: A list of books The response also includes a Content-Range header in the format 'items start-end/total', which provides the total record count.
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    description: The range of items returned and total count
                    type: string
                    x-format: items {start}-{end}/{total}
                    example: items 0-24/100
                    x-ignore-merge: true
                  results:
                    description: The list of books
                    type: array
                    items:
                      $ref: '#/components/schemas/Book'
                    minItems: 0
                    maxItems: 50
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized search request.
        '403':
          description: Forbidden - The request is understood but access is not permitted.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Too Many Requests
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Books
      x-collection: books
      description: Create multiple book records
      summary: Create books in bulk
      operationId: createBooks
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Book'
              minItems: 1
              maxItems: 50
      responses:
        '201':
          description: Books created successfully in bulk
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    description: The range of items returned and total count
                    type: string
                    x-format: items {start}-{end}/{total}
                    example: items 0-24/100
                    x-ignore-merge: true
                  results:
                    description: The list of books
                    type: array
                    items:
                      $ref: '#/components/schemas/Book'
                    minItems: 0
                    maxItems: 50
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized search request.
        '403':
          description: Forbidden - The request is understood but access is not permitted.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Too Many Requests
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Books
      x-collection: books
      description: Update multiple books in your personal library. Only need to provide those fields that need to be updated.
      summary: Update books
      operationId: updateBooks
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Book'
              minItems: 1
              maxItems: 50
      responses:
        '200':
          description: Updated successfully
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    description: The range of items returned and total count
                    type: string
                    x-format: items {start}-{end}/{total}
                    example: items 0-24/100
                    x-ignore-merge: true
                  results:
                    description: The list of books
                    type: array
                    items:
                      $ref: '#/components/schemas/Book'
                    minItems: 0
                    maxItems: 50
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized search request.
        '403':
          description: Forbidden - The request is understood but access is not permitted.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Too Many Requests
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Books
      x-collection: books
      description: Remove a book
      summary: Delete books
      operationId: deleteBooks
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/BookIdsQueryOptional'
        - $ref: '#/components/parameters/BookIdQueryOptional'
      responses:
        '200':
          description: A list of books The response also includes a Content-Range header in the format 'items start-end/total', which provides the total record count.
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    description: The range of items returned and total count
                    type: string
                    x-format: items {start}-{end}/{total}
                    example: items 0-24/100
                    x-ignore-merge: true
                  results:
                    description: The list of books
                    type: array
                    items:
                      $ref: '#/components/schemas/Book'
                    minItems: 0
                    maxItems: 50
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized search request.
        '403':
          description: Forbidden - The request is understood but access is not permitted.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Too Many Requests
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    BookIdsQueryOptional:
      description: Unique identifier for the book.
      name: bookIds
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          format: uuid
    BookIdQueryOptional:
      name: bookId
      in: query
      required: false
      schema:
        type: string
        pattern: ^(eq\.|neq\.)[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$|^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$|^isNull$
      description: Unique identifier for this resource
    BookId:
      description: Unique identifier for the book.
      name: bookId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LimitQueryOptional:
      description: Specifies the number(limit) of results to provide in a single response.
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
        x-ignore-merge: true
    OffsetQueryOptional:
      description: Specify the page offset this request is to provide.
      in: query
      name: offset
      schema:
        type: integer
        default: 0
        minimum: 0
        x-ignore-merge: true
    OrderQueryOptional:
      name: order
      in: query
      description: Sort order for the results (e.g., order=price.asc or order=year.desc)
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9_]+\.(asc|desc)$
        x-ignore-merge: true
      example: price.asc
    BookUserRatingQueryOptional:
      name: userRating
      in: query
      required: false
      schema:
        type: string
        pattern: ^(eq\.|neq\.|gt\.|lt\.|gte\.|lte\.)[0-9]+$|^[0-9]+$|^isNull$
      description: Personal rating of this book (0-10 scale)
    BookIsbnIdQueryOptional:
      name: isbnId
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
      description: International Standard Book Number for the book
    BookTitleQueryOptional:
      name: bookTitle
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
      description: The title of the book
    BookGenresQueryOptional:
      name: genres
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
      description: Comma-separated list of genres
    BookAuthorQueryOptional:
      name: author
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
      description: The person who wrote the book
    BookNarratorQueryOptional:
      name: narrator
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
      description: The person who narrated the book
    BookSeriesNameQueryOptional:
      name: seriesName
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
      description: Name of the book series this book belongs to
    BookNumBooksInSeriesQueryOptional:
      name: numBooksInSeries
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
      description: Total number of books in the series
    BookBookNumInSeriesQueryOptional:
      name: bookNumInSeries
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
      description: The position of this book within its series
    BookAddedAtDateTimeQueryOptional:
      name: addedAtDateTime
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
      description: When this book was added to your library
    BookUpdatedAtDateTimeQueryOptional:
      name: updatedAtDateTime
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
      description: When this book was last updated
  schemas:
    Book:
      description: An book in your personal library
      type: object
      properties:
        bookId:
          $ref: '#/components/schemas/BookId'
        userRating:
          description: Personal rating of this book (0-10 scale)
          type: integer
          minimum: 0
          maximum: 10
        isbnId:
          description: International Standard Book Number for the book
          type: string
          pattern: ^[0-9\-]+$
          minLength: 10
          maxLength: 17
        bookTitle:
          description: The title of the book
          type: string
          pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?/-]+$
          minLength: 1
          maxLength: 255
          example: The Great Gatsby
          x-query-name-prefix-prefix: Book
        genres:
          description: Comma-separated list of genres
          type: string
          pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?-]+$
          minLength: 1
          maxLength: 255
          example: Fiction, Classic, Drama
        author:
          description: The person who wrote the book
          type: string
          pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?-]+$
          minLength: 1
          maxLength: 255
          example: F. Scott Fitzgerald
        narrator:
          description: The person who narrated the book
          type: string
          pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?-]+$
          minLength: 1
          maxLength: 255
          example: Jake Gyllenhaal
        seriesName:
          description: Name of the book series this book belongs to
          type: string
          pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?-]+$
          minLength: 1
          maxLength: 150
          example: The Hunger Games
        numBooksInSeries:
          description: Total number of books in the series
          type: integer
          minimum: 0
        bookNumInSeries:
          description: The position of this book within its series
          type: integer
          minimum: 0
        addedAtDateTime:
          description: When this book was added to your library
          type: string
          format: date-time
          readOnly: true
        updatedAtDateTime:
          description: When this book was last updated
          type: string
          format: date-time
          readOnly: true
      additionalProperties: false
    BookId:
      description: Unique identifier for this resource
      type: string
      format: uuid
      x-primary-key: true
    ContentRange:
      description: The range of items returned and total count
      type: string
      x-format: items {start}-{end}/{total}
      example: items 0-24/100
      x-ignore-merge: true
    Error:
      type: object
      properties:
        message:
          type: string
          description: Error message from service
      additionalProperties: false
    ErrorItem:
      type: object
      properties:
        objectName:
          description: Name of the object containing the field that is in error
          type: string
        property:
          description: Name of the property in error
          type: string
        rejectedValue:
          description: Value that caused the error
          type: string
        message:
          type: string
          description: Error message from service
      additionalProperties: false
    UsageStatusEnum:
      description: Your viewing or listening progress status
      type: string
      enum:
        - UNKNOWN
        - UNSEEN
        - IN_PROGRESS
        - COMPLETED
        - ABANDONED
  headers:
    Content-Range:
      description: The range of items returned and total count
      schema:
        $ref: '#/components/schemas/ContentRange'
      x-ignore-merge: true
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ErrorItem'
    UnprocessableEntity:
      description: Unprocessable Entity
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ErrorItem'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
externalDocs:
  description: Find out more about acme API Products
  url: https://developer.acme.com
