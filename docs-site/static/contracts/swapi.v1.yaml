components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d+$
    IdQueryOptional:
      name: id
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
    LimitQueryOptional:
      description: Specifies the number(limit) of results to provide in a single response.
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
        x-ignore-merge: true
    OffsetQueryOptional:
      description: Specify the page offset this request is to provide.
      in: query
      name: offset
      schema:
        type: integer
        default: 0
        minimum: 0
        x-ignore-merge: true
    OrderQueryOptional:
      name: order
      in: query
      description: Sort order for the results (e.g., order=price.asc or order=year.desc)
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9_]+\.(asc|desc)$
        x-ignore-merge: true
      example: price.asc
    SwapiV1IdQueryOptional:
      name: id
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
      description: Person Identifier
    SwapiV1NameQueryOptional:
      name: name
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z0-9._,+:'|&@\s()#!?*-]+$
    SwapiV1BirthYearQueryOptional:
