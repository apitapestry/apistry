        - $ref: '#/components/parameters/SwapiV1SkinColorQueryOptional'
      responses:
        '200':
          description: A list of People
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    description: The range of items returned and total count
                    type: string
                    x-format: items {start}-{end}/{total}
                    example: items 0-24/100
                    x-ignore-merge: true
                  count:
                    type: integer
                    x-format: '{total}'
                  next:
                    type: string
                    format: uri
                    x-format: /people?{nextQuerystring}
                  previous:
                    type: string
                    format: uri
                    x-format: /people?{previousQuerystring}
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SwapiPersonV1'
                    minItems: 0
                    maxItems: 10
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized search request.
        '403':
          description: Forbidden - The request is understood but access is not permitted.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Too Many Requests
        '500':
          $ref: '#/components/responses/InternalServerError'
