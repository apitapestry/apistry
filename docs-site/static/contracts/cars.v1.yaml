openapi: 3.0.3
info:
  title: Car Lot Management API
  description: API for managing cars in a car lot inventory system. Supports CRUD operations for car inventory with filtering, sorting, and pagination.
  version: v1
  contact:
    email: API-Gov-Team@gmail.com
    name: acme API Gov Team
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://developer.acme.com/terms/
servers:
  - url: https://api.carlot.example.com/v1
paths:
  /v1/cars:
    get:
      tags:
        - Cars
      x-collection: cars
      summary: Get Cars
      description: |
        Search for cars in the inventory with optional filtering, sorting, and pagination.
        Supports query operators for flexible filtering.
      operationId: getCars
      x-filters:
        - carStatus.nin.deleted,sold
      parameters:
        - $ref: '#/components/parameters/LimitQueryOptional'
        - $ref: '#/components/parameters/OffsetQueryOptional'
        - $ref: '#/components/parameters/OrderQueryOptional'
        - $ref: '#/components/parameters/CarsVinQueryOptional'
        - $ref: '#/components/parameters/CarsMakeQueryOptional'
        - $ref: '#/components/parameters/CarsModelQueryOptional'
        - $ref: '#/components/parameters/CarsModelYearQueryOptional'
        - $ref: '#/components/parameters/CarsManufactureDateQueryOptional'
        - $ref: '#/components/parameters/CarsColorQueryOptional'
        - $ref: '#/components/parameters/CarsMileageQueryOptional'
        - $ref: '#/components/parameters/CarsPriceQueryOptional'
        - $ref: '#/components/parameters/CarsCarStatusQueryOptional'
        - $ref: '#/components/parameters/CarsBodyTypeQueryOptional'
        - $ref: '#/components/parameters/CarsTransmissionQueryOptional'
        - $ref: '#/components/parameters/CarsFuelTypeQueryOptional'
        - $ref: '#/components/parameters/CarsEngineQueryOptional'
        - $ref: '#/components/parameters/CarsDriveTypeQueryOptional'
        - $ref: '#/components/parameters/CarsDoorsQueryOptional'
        - $ref: '#/components/parameters/CarsSeatsQueryOptional'
        - $ref: '#/components/parameters/CarsFeaturesQueryOptional'
        - $ref: '#/components/parameters/CarsEventsQueryOptional'
        - $ref: '#/components/parameters/CarsDescriptionQueryOptional'
        - $ref: '#/components/parameters/CarsImagesQueryOptional'
        - $ref: '#/components/parameters/CarsCreatedAtDateTimeQueryOptional'
        - $ref: '#/components/parameters/CarsUpdatedAtDateTimeQueryOptional'
      responses:
        '200':
          description: A list of cars matching the search criteria
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    description: The range of items returned and total count
                    type: string
                    x-format: items {start}-{end}/{total}
                    example: items 0-24/100
                    x-ignore-merge: true
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Car'
                    minItems: 0
                    maxItems: 10
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized search request.
        '403':
          description: Forbidden - The request is understood but access is not permitted.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Too Many Requests
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Cars
      x-collection: cars
      summary: Delete Cars
      description: Delete Cars
      operationId: deleteCars
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/CarIdsOptional'
        - $ref: '#/components/parameters/CarsColorQueryOptional'
      responses:
        '200':
          description: A list of cars matching the search criteria
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    description: The range of items returned and total count
                    type: string
                    x-format: items {start}-{end}/{total}
                    example: items 0-24/100
                    x-ignore-merge: true
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Car'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized search request.
        '403':
          description: Forbidden - The request is understood but access is not permitted.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Too Many Requests
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Cars
      x-collection: cars
      summary: Create a new car
      description: Add a new car to the inventory.
      operationId: createCar
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: array
                  items:
                    $ref: '#/components/schemas/Car'
                - $ref: '#/components/schemas/Car'
      responses:
        '201':
          description: Cars created successfully
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    description: The range of items returned and total count
                    type: string
                    x-format: items {start}-{end}/{total}
                    example: items 0-24/100
                    x-ignore-merge: true
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Car'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized search request.
        '403':
          description: Forbidden - The request is understood but access is not permitted.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Too Many Requests
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Cars
      x-collection: cars
      summary: Update cars
      description: Update cars
      operationId: updateCars
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CarUpdate'
              minItems: 1
              maxItems: 100
      responses:
        '200':
          description: Cars update successfully
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
          content:
            application/json:
              schema:
                type: object
                properties:
                  contentRange:
                    description: The range of items returned and total count
                    type: string
                    x-format: items {start}-{end}/{total}
                    example: items 0-24/100
                    x-ignore-merge: true
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Car'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized search request.
        '403':
          description: Forbidden - The request is understood but access is not permitted.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Too Many Requests
        '500':
          $ref: '#/components/responses/InternalServerError'
