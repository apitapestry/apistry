  schemas:
    Car:
      description: A car in the car lot inventory
      type: object
      required:
        - vin
        - make
        - model
        - modelYear
        - price
      x-validations: null
      properties:
        carId:
          description: Unique identifier for the car
          type: string
          format: uuid
          readOnly: true
          example: a3bb189e-8bf9-3888-9912-ace4e6543002
          x-insert: uuid
        vin:
          description: Vehicle Identification Number (17 characters)
          type: string
          pattern: ^[A-HJ-NPR-Z0-9]+$
          minLength: 17
          maxLength: 17
          example: JHMCM56557C404453
        make:
          description: Car manufacturer
          type: string
          minLength: 1
          maxLength: 50
          example: Toyota
        model:
          description: Car model name
          type: string
          minLength: 1
          maxLength: 50
          example: Camry
        modelYear:
          description: Model year
          type: integer
          minimum: 1900
          maximum: 2100
          example: 2023
        manufactureDate:
          description: Date of manufacture
          type: string
          format: date
          example: '2023-04-15'
          x-validations:
            - function: compare
              parameters:
                operator: <=
                value: now-6mo
            - function: compare
              parameters:
                operator: '>='
                value: now-50y
        color:
          description: Exterior color
          type: string
          minLength: 1
          maxLength: 30
          example: Silver
          nullable: true
        mileage:
          description: Current odometer reading in miles
          type: integer
          minimum: 0
          example: 15234
        price:
          description: List price in USD
          type: number
          minimum: 0
          example: 28500
        carStatus:
          $ref: '#/components/schemas/CarStatus'
        bodyType:
          description: Type of vehicle body
          type: string
          enum:
            - sedan
            - suv
            - truck
            - coupe
            - convertible
            - wagon
            - van
            - hatchback
          example: sedan
        transmission:
          description: Type of transmission
          type: string
          enum:
            - automatic
            - manual
            - cvt
          example: automatic
        fuelType:
          description: Type of fuel or power source
          type: string
          enum:
            - gasoline
            - diesel
            - electric
            - hybrid
            - plug-in-hybrid
          example: hybrid
        engine:
          description: Engine specifications
          type: string
          maxLength: 100
          example: 2.5L 4-Cylinder
        driveType:
          description: Drive train configuration
          type: string
          enum:
            - fwd
            - rwd
            - awd
            - 4wd
          example: fwd
        doors:
          description: Number of doors
          type: integer
          minimum: 2
          maximum: 5
          example: 4
        seats:
          description: Number of seats
          type: integer
          minimum: 2
          maximum: 9
          example: 5
        features:
          description: List of features and options
          type: array
          items:
            type: string
          uniqueItems: true
          maxItems: 50
          example:
            - Backup Camera
            - Bluetooth
            - Cruise Control
            - Leather Seats
        events:
          description: List of significant events (e.g., accidents, services)
          type: array
          items:
            $ref: '#/components/schemas/Event'
          minItems: 0
          maxItems: 100
        description:
          description: Additional notes or description
          type: string
          maxLength: 1000
          example: Well-maintained, single owner, complete service history
        images:
          description: URLs to car images
          type: array
          items:
            type: string
          maxItems: 20
          example:
            - https://example.com/images/car1.jpg
            - https://example.com/images/car2.jpg
        createdAtDateTime:
          description: When this car was added to inventory
          type: string
          format: date-time
          readOnly: true
          example: '2025-01-15T10:30:00Z'
          x-insert: now
        updatedAtDateTime:
          description: When this car record was last updated
          type: string
          format: date-time
          readOnly: true
          example: '2025-01-20T14:45:00Z'
          x-update: now
      additionalProperties: false
    CarStatus:
      description: Current availability status
      type: string
      enum:
        - available
        - sold
        - deleted
        - reserved
        - pending
        - maintenance
      example: available
      readOnly: true
      x-insert: pending
    CarUpdate:
      description: Schema for updating an existing car (all fields optional)
      type: object
      properties:
        carId:
          type: string
          format: uuid
          readOnly: true
        color:
          description: Exterior color
          type: string
          minLength: 1
          maxLength: 30
          example: Silver
          nullable: true
        mileage:
          description: Current odometer reading in miles
          type: integer
          minimum: 0
          nullable: true
          example: 15234
        price:
          description: List price in USD
          type: number
          minimum: 0
          example: 28500
        features:
          description: List of features and options
          type: array
          items:
            type: string
          maxItems: 50
          example:
            - Backup Camera
            - Bluetooth
            - Cruise Control
            - Leather Seats
        description:
          description: Additional notes or description
          type: string
          minLength: 2
          maxLength: 1000
          example: Well-maintained, single owner, complete service history
        images:
          description: URLs to car images
          type: array
          items:
            type: string
          maxItems: 20
          example:
            - https://example.com/images/car1.jpg
            - https://example.com/images/car2.jpg
      additionalProperties: false
    ContentRange:
      description: The range of items returned and total count
      type: string
      x-format: items {start}-{end}/{total}
      example: items 0-24/100
      x-ignore-merge: true
    Error:
      type: object
      properties:
        message:
          type: string
          description: Error message from service
      additionalProperties: false
    ErrorItem:
      type: object
      properties:
        objectName:
          description: Name of the object containing the field that is in error
          type: string
        property:
          description: Name of the property in error
          type: string
        rejectedValue:
          description: Value that caused the error
          type: string
        message:
          type: string
          description: Error message from service
      additionalProperties: false
    Event:
      type: object
      additionalProperties: false
      properties:
        eventId:
          description: Unique Event ID
          type: string
          format: uuid
          readOnly: true
          x-insert: uuid
        eventDate:
          description: Date of the event
          type: string
          format: date
          example: '2024-05-10'
        eventType:
          description: Type of event
          type: string
          example: Accident
        description:
          description: Details about the event
          type: string
          nullable: true
          example: Rear-ended at a stoplight, minor damage to bumper
  headers:
    Content-Range:
      description: The range of items returned and total count
      schema:
        $ref: '#/components/schemas/ContentRange'
      x-ignore-merge: true
  responses:
    NotFound:
      description: Resource Not Found
      x-ignore-merge: true
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ErrorItem'
    UnprocessableEntity:
      description: Unprocessable Entity
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ErrorItem'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: apiKey
      x-ignore-merge: true
    bearerAuth:
      type: http
      scheme: bearer
      x-ignore-merge: true
externalDocs:
  description: Find out more about acme API Products
  url: https://developer.acme.com
