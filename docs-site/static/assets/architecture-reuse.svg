<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="655px" preserveAspectRatio="none" style="width:630px;height:655px;background:#FFFFFF;" version="1.1" viewBox="0 0 630 655" width="630px" zoomAndPan="magnify"><title>Service Topology and Cost Comparison</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="Inter" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="283.418" x="166.5343" y="23.5352">Service Topology and Cost Comparison</text></g><!--entity TRAD--><g class="entity" data-entity="TRAD" data-source-line="32" data-uid="ent0002" id="entity_TRAD"><rect fill="#FEE2E2" height="151.9063" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="249.8379" x="7" y="127.0183"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="186.7646" x="38.5366" y="150.5534">Traditional API Architecture</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="129.7041" y="167.0417">&#160;</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="229.8379" x="17" y="183.53">Each service is a full custom build</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="129.7041" y="200.0183">&#160;</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="142.1602" x="60.8389" y="216.5066">- Custom controllers</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="191.6729" x="36.0825" y="232.9948">- Embedded validation logic</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="150.6982" x="56.5698" y="249.4831">- Bespoke persistence</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="219.3584" x="22.2397" y="265.9714">- Duplicated infrastructure code</text></g><!--entity A--><g class="entity" data-entity="A" data-source-line="39" data-uid="ent0003" id="entity_A"><rect fill="#E5E7EB" height="52.9766" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="94.5664" x="422.88" y="44.4883"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="61.4209" x="439.4528" y="68.0234">Service A</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="74.5664" x="432.88" y="84.5117">(code only)</text></g><!--entity B--><g class="entity" data-entity="B" data-source-line="40" data-uid="ent0004" id="entity_B"><rect fill="#E5E7EB" height="52.9766" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="94.5664" x="422.88" y="132.4883"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="59.8145" x="440.256" y="156.0234">Service B</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="74.5664" x="432.88" y="172.5117">(code only)</text></g><!--entity C--><g class="entity" data-entity="C" data-source-line="41" data-uid="ent0005" id="entity_C"><rect fill="#E5E7EB" height="52.9766" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="137.0381" x="401.64" y="220.4883"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="61.4482" x="439.4349" y="244.0234">Service C</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="117.0381" x="411.64" y="260.5117">(contract + code)</text></g><g class="entity" data-entity="GMN9" data-source-line="48" data-uid="ent0010" id="entity_GMN9"><path d="M316.84,308.4883 L316.84,351.4648 L623.4865,351.4648 L623.4865,318.4883 L613.4865,308.4883 L316.84,308.4883" fill="#F9FAFB" style="stroke:#9CA3AF;stroke-width:0.5;"/><path d="M613.4865,308.4883 L613.4865,318.4883 L623.4865,318.4883 L613.4865,308.4883" fill="#F9FAFB" style="stroke:#9CA3AF;stroke-width:1;"/><text fill="#374151" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="247.6182" x="341.8542" y="327.0234">Cost scales with number of services.</text><text fill="#374151" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="285.6465" x="322.84" y="343.5117">Architecture is reimplemented repeatedly.</text></g><!--entity NEW--><g class="entity" data-entity="NEW" data-source-line="56" data-uid="ent0012" id="entity_NEW"><rect fill="#DCFCE7" height="151.9063" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="243.4189" x="348.45" y="386.0183"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="223.4189" x="358.45" y="409.5534">Contract-Driven API Architecture</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="467.9446" y="426.0417">&#160;</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="160.7129" x="389.803" y="442.53">Single reusable runtime</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="467.9446" y="459.0183">&#160;</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="183.2783" x="378.5203" y="475.5066">- Standardized persistence</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="158.1699" x="391.0745" y="491.9948">- Declarative validation</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="152.5371" x="393.8909" y="508.4831">- Enforced boundaries</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="185.8691" x="377.2249" y="524.9714">- One operational footprint</text></g><!--entity C1--><g class="entity" data-entity="C1" data-source-line="63" data-uid="ent0013" id="entity_C1"><rect fill="#E0E7FF" height="36.4883" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="91.3604" x="86.24" y="372.7283"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="71.3604" x="96.24" y="396.2634">Contract 1</text></g><!--entity C2--><g class="entity" data-entity="C2" data-source-line="64" data-uid="ent0014" id="entity_C2"><rect fill="#E0E7FF" height="36.4883" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="91.3604" x="86.24" y="443.7283"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="71.3604" x="96.24" y="467.2634">Contract 2</text></g><!--entity CN--><g class="entity" data-entity="CN" data-source-line="65" data-uid="ent0015" id="entity_CN"><rect fill="#E0E7FF" height="36.4883" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="92.8506" x="85.49" y="514.7283"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="72.8506" x="95.49" y="538.2634">Contract N</text></g><g class="entity" data-entity="GMN19" data-source-line="72" data-uid="ent0020" id="entity_GMN19"><path d="M369.23,572.9983 L369.23,648.9514 A0,0 0 0 0 369.23,648.9514 L571.0884,648.9514 A0,0 0 0 0 571.0884,648.9514 L571.0884,582.9983 L561.0884,572.9983 L474.16,572.9983 L470.16,537.9983 L466.16,572.9983 L369.23,572.9983 A0,0 0 0 0 369.23,572.9983" fill="#F9FAFB" style="stroke:#9CA3AF;stroke-width:0.5;"/><path d="M561.0884,572.9983 L561.0884,582.9983 L571.0884,582.9983 L561.0884,572.9983" fill="#F9FAFB" style="stroke:#9CA3AF;stroke-width:0.5;"/><text fill="#374151" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="180.8584" x="375.23" y="591.5334">Cost scales with contracts,</text><text fill="#374151" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="118.6377" x="406.3404" y="608.0217">not with services.</text><text fill="#374151" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="178.876" x="376.2212" y="624.51">New capability is primarily</text><text fill="#374151" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="103.8584" x="413.73" y="640.9983">a new contract.</text></g><!--link TRAD to A--><g class="link" data-entity-1="TRAD" data-entity-2="A" data-source-line="43" data-uid="lnk6" id="link_TRAD_A"><path d="M256.86,140.2683 C276.69,131.2283 297.15,122.4683 316.84,114.9683 C351.57,101.7483 386.2232,91.7485 416.7132,83.8185" fill="none" id="TRAD-to-A" style="stroke:#374151;stroke-width:1.5;"/><polygon fill="#374151" points="422.52,82.3083,412.8029,80.7025,417.681,83.5668,414.8166,88.4449,422.52,82.3083" style="stroke:#374151;stroke-width:1.5;"/></g><!--link TRAD to B--><g class="link" data-entity-1="TRAD" data-entity-2="B" data-source-line="44" data-uid="lnk7" id="link_TRAD_B"><path d="M257.17,186.7083 C314.79,179.1683 373.8509,171.4478 416.5109,165.8578" fill="none" id="TRAD-to-B" style="stroke:#374151;stroke-width:1.5;"/><polygon fill="#374151" points="422.46,165.0783,413.0166,162.2815,417.5024,165.7279,414.056,170.2137,422.46,165.0783" style="stroke:#374151;stroke-width:1.5;"/></g><!--link TRAD to C--><g class="link" data-entity-1="TRAD" data-entity-2="C" data-source-line="45" data-uid="lnk8" id="link_TRAD_C"><path d="M257.17,219.2283 C305.99,225.6183 354.1807,231.9297 395.5207,237.3397" fill="none" id="TRAD-to-C" style="stroke:#374151;stroke-width:1.5;"/><polygon fill="#374151" points="401.47,238.1183,393.0651,232.9843,396.5123,237.4695,392.0271,240.9166,401.47,238.1183" style="stroke:#374151;stroke-width:1.5;"/></g><!--link TRAD to GMN9--><g class="link" data-entity-1="TRAD" data-entity-2="GMN9" data-source-line="48" data-uid="lnk11" id="link_TRAD_GMN9"><path d="M257.16,266.4383 C276.86,275.3183 297.21,283.8383 316.84,290.9683 C334.28,297.3083 353.21,303.0283 371.6,308.0183" fill="none" id="TRAD-GMN9" style="stroke:#374151;stroke-width:1.5;stroke-dasharray:7,7;"/></g><!--link C1 to NEW--><g class="link" data-entity-1="C1" data-entity-2="NEW" data-source-line="67" data-uid="lnk16" id="link_C1_NEW"><path d="M177.92,400.4783 C221.31,409.6383 283.0694,422.6789 342.2294,435.1689" fill="none" id="C1-to-NEW" style="stroke:#374151;stroke-width:1.5;"/><polygon fill="#374151" points="348.1,436.4083,340.1204,430.6354,343.2078,435.3754,338.4678,438.4629,348.1,436.4083" style="stroke:#374151;stroke-width:1.5;"/></g><!--link C2 to NEW--><g class="link" data-entity-1="C2" data-entity-2="NEW" data-source-line="68" data-uid="lnk17" id="link_C2_NEW"><path d="M177.92,461.9683 C221.31,461.9683 282.94,461.9683 342.1,461.9683" fill="none" id="C2-to-NEW" style="stroke:#374151;stroke-width:1.5;"/><polygon fill="#374151" points="348.1,461.9683,339.1,457.9683,343.1,461.9683,339.1,465.9683,348.1,461.9683" style="stroke:#374151;stroke-width:1.5;"/></g><!--link CN to NEW--><g class="link" data-entity-1="CN" data-entity-2="NEW" data-source-line="69" data-uid="lnk18" id="link_CN_NEW"><path d="M178.62,523.3183 C222.07,514.1483 283.4793,501.1774 342.3693,488.7474" fill="none" id="CN-to-NEW" style="stroke:#374151;stroke-width:1.5;"/><polygon fill="#374151" points="348.24,487.5083,338.6079,485.4532,343.3478,488.5409,340.2601,493.2807,348.24,487.5083" style="stroke:#374151;stroke-width:1.5;"/></g><!--SRC=[fLGzRzim4DtrAmxEq1QjWyf9u6He0KcMW2vk4HleaeKcJpPXYXH8AgvRzB_tA2cn5GT6W6eGoBjtt-_efLS82xIFaYCiJMsKMU-1QG6PSPv-LSsiT4P7aTjAJHTMmOhnxTgQHekCy1OkYlOxGhWD4sOdzHfAfXmUQGIMh56-CDhFMONmJNkqh-iNyZT2V7sgNE8ldoYvrXLg3nnR5v72qeCtOELwuq58YzpBOU91nFIQIluJ0Tnt5LYD5cxfdXehqFObnSNaxcfAqf39aooERoVJwE-nIsQjsRNkUj3Lz3g-YUc-t4Y-rUWSn9StGoDjV9T2UjB9ko8fqfV9t6N9LL8Ca-dZaDztyENyHuYbPKA6TZ05YUKRwQaLZSKt64U7hbqKUJx99p0QkFlnRU3oGJ_edF4Dk9vMqW63ib4AUEEy8VuqKea06qFMIJZLPOrIQ5sGvjKAXK01Zqn9mK8W869A7fGfkjfi4Me2I-THSmpYMLChoPadAwbBovotJPiFEHSu0kPWUP_C1kNaD_aqJs7qj039WtuVq62qsdzeRP9p-FGKdvx3PosUIcNSmySsiSugYwAG78p7NodYyp4z70dHigPZjocxOjebTPmfTB2JVWEweTRPeE-xxowZu-64OLYKLQqmB0yrosADeMjgVnaXxNs8yZPEpN7tFroQPKMMJs6KzGqPpwnyHFqgdnQojR7OEBOAXqPxMM77e