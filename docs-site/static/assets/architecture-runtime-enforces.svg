<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="530px" preserveAspectRatio="none" style="width:719px;height:530px;background:#FFFFFF;" version="1.1" viewBox="0 0 719 530" width="719px" zoomAndPan="magnify"><title>Contract Declares, Runtime Enforces</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="Inter" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="263.1631" x="221.3784" y="23.5352">Contract Declares, Runtime Enforces</text></g><!--entity C--><g class="entity" data-entity="C" data-source-line="35" data-uid="ent0002" id="entity_C"><rect fill="#E0E7FF" height="102.4414" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="251.5879" x="239.9" y="44.4883"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="83.9385" x="323.7247" y="68.0234">API Contract</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="363.4791" y="84.5117">&#160;</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="126.1641" x="302.6119" y="101">- OpenAPI schema</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="231.5879" x="249.9" y="117.4883">- Semantic validation declarations</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="132.9385" x="299.2247" y="133.9766">- Persistence intent</text></g><!--entity R--><g class="entity" data-entity="R" data-source-line="40" data-uid="ent0003" id="entity_R"><rect fill="#DBEAFE" height="118.9297" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="255.5938" x="237.9" y="224.9283"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="82.2432" x="324.5753" y="248.4634">API Runtime</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="363.482" y="264.9517">&#160;</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="138.7217" x="296.336" y="281.44">- Interprets contract</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="215.5986" x="257.8976" y="297.9283">- Executes semantic validations</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="235.5938" x="247.9" y="314.4166">- Applies deterministic derivations</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="176.0049" x="277.6944" y="330.9048">- Persists to the Database</text></g><!--entity DB--><g class="entity" data-entity="DB" data-source-line="46" data-uid="ent0004" id="entity_DB"><rect fill="#DCFCE7" height="102.4414" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="229.3848" x="7" y="421.8583"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="143.377" x="50.0039" y="445.3934">Database Persistence</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="119.4775" y="461.8817">&#160;</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="167.5557" x="37.9146" y="478.37">- Durable facts recorded</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="209.3848" x="17" y="494.8583">- Database guarantees applied</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="206.8145" x="18.2852" y="511.3466">- Change becomes observable</text></g><!--entity V--><g class="entity" data-entity="V" data-source-line="51" data-uid="ent0005" id="entity_V"><rect fill="#F3E8FF" height="102.4414" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="208.46" x="505.46" y="421.8583"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="182.4033" x="518.4883" y="445.3934">Validation Function Library</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="607.4751" y="461.8817">&#160;</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="180.9336" x="519.2232" y="478.37">- Pure validation functions</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="188.46" x="515.46" y="494.8583">- Reusable across contracts</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="118.0361" x="550.6719" y="511.3466">- Side-effect free</text></g><g class="entity" data-entity="GMN9" data-source-line="61" data-uid="ent0010" id="entity_GMN9"><path d="M270.97,451.5883 L270.97,469.0783 L236.47,473.0783 L270.97,477.0783 L270.97,494.5648 A0,0 0 0 0 270.97,494.5648 L470.4153,494.5648 A0,0 0 0 0 470.4153,494.5648 L470.4153,461.5883 L460.4153,451.5883 L270.97,451.5883 A0,0 0 0 0 270.97,451.5883" fill="#F9FAFB" style="stroke:#9CA3AF;stroke-width:0.5;"/><path d="M460.4153,451.5883 L460.4153,461.5883 L470.4153,461.5883 L460.4153,451.5883" fill="#F9FAFB" style="stroke:#9CA3AF;stroke-width:0.5;"/><text fill="#374151" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="178.4453" x="276.97" y="470.1234">Persistence marks the end</text><text fill="#374151" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="171.7461" x="280.3196" y="486.6117">of runtime responsibility.</text></g><!--link C to R--><g class="link" data-entity-1="C" data-entity-2="R" data-source-line="56" data-uid="lnk6" id="link_C_R"><path d="M365.69,147.2283 C365.69,171.0883 365.69,193.7183 365.69,218.5583" fill="none" id="C-to-R" style="stroke:#374151;stroke-width:1.5;"/><polygon fill="#374151" points="365.69,224.5583,369.69,215.5583,365.69,219.5583,361.69,215.5583,365.69,