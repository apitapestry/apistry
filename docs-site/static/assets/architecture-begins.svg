<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="366px" preserveAspectRatio="none" style="width:605px;height:366px;background:#FFFFFF;" version="1.1" viewBox="0 0 605 366" width="605px" zoomAndPan="magnify"><title>Where Frameworks End and Architecture Begins</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="Inter" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="346.3975" x="122.4391" y="23.5352">Where Frameworks End and Architecture Begins</text></g><!--entity FW--><g class="entity" data-entity="FW" data-source-line="35" data-uid="ent0002" id="entity_FW"><rect fill="#E5E7EB" height="118.9297" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="239.1602" x="7" y="44.4883"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="207.3408" x="22.9097" y="68.0234">Framework-Handled Concerns</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="124.3652" y="84.5117">&#160;</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="173.1953" x="39.9824" y="101">- Security (authn / authz)</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="141.627" x="55.7666" y="117.4883">- Routing &amp; dispatch</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="219.1602" x="17" y="133.9766">- Schema &amp; structural validation</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="212.3242" x="20.418" y="150.4648">- Serialization &amp; error mapping</text></g><!--entity ADZ--><g class="entity" data-entity="ADZ" data-source-line="41" data-uid="ent0003" id="entity_ADZ"><rect fill="#DBEAFE" height="118.9297" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" wid