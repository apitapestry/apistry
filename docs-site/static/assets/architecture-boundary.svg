nt-family="Inter" font-size="14" lengthAdjust="spacing" textLength="208.8789" x="35.7612" y="544.3266">- Domain workflows &amp; policies</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="193.5938" x="43.4038" y="560.8148">- Side effects &amp; notifications</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="188.8838" x="45.7588" y="577.3031">- Integrations &amp; projections</text></g><g class="entity" data-entity="GMN7" data-source-line="59" data-uid="ent0008" id="entity_GMN7"><path d="M289.54,304.1283 L289.54,321.6183 L255.29,325.6183 L289.54,329.6183 L289.54,347.1048 A0,0 0 0 0 289.54,347.1048 L572.8691,347.1048 A0,0 0 0 0 572.8691,347.1048 L572.8691,314.1283 L562.8691,304.1283 L289.54,304.1283 A0,0 0 0 0 289.54,304.1283" fill="#F9FAFB" style="stroke:#9CA3AF;stroke-width:0.5;"/><path d="M562.8691,304.1283 L562.8691,314.1283 L572.8691,314.1283 L562.8691,304.1283" fill="#F9FAFB" style="stroke:#9CA3AF;stroke-width:0.5;"/><text fill="#374151" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="262.3291" x="295.54" y="322.6634">Persistence is the execution boundary.</text><text fill="#374151" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="193.0537" x="330.1777" y="339.1517">API responsibility ends here.</text></g><!--link API to PB--><g class="link" data-entity-1="API" data-entity-2="PB" data-source-line="55" data-uid="lnk5" id="link_API_PB"><path d="M140.2,196.8083 C140.2,222.5583 140.2,244.7183 140.2,268.0383" fill="none" id="API-to-PB" style="stroke:#374151;stroke-width:1.5;"/><polygon fill="#374151" points="140.2,274.0383,144.2,265.0383,140.2,269.0383,136.2,265.0383,140.2,274.0383" style="stroke:#374151;stroke-width:1.5;"/><text fill="#000000" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="130.1836" x="141.2" y="240.9334">Persist to Database</text></g><!--link PB to OUT--><g class="link" data-entity-1="PB" data-