<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="596px" preserveAspectRatio="none" style="width:579px;height:596px;background:#FFFFFF;" version="1.1" viewBox="0 0 579 596" width="579px" zoomAndPan="magnify"><title>API Service Responsibility Boundary</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="Inter" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="259.0684" x="153.4004" y="23.5352">API Service Responsibility Boundary</text></g><!--entity API--><g class="entity" data-entity="API" data-source-line="35" data-uid="ent0002" id="entity_API"><rect fill="#DBEAFE" height="151.9063" rx="4" ry="4" style="stroke:#1F2937;stroke-width:0.5;" width="241.7168" x="19.34" y="44.4883"/><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="73.1924" x="103.6022" y="68.0234">API Service</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="137.9836" y="84.5117">&#160;</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="221.7168" x="29.34" y="101">- Authentication &amp; authorization</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="219.1602" x="30.6183" y="117.4883">- Schema &amp; structural validation</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="208.3047" x="36.0461" y="133.9766">- Semantic business validation</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="182.5264" x="48.9352" y="150.4648">- Deterministic derivations</text><text fill="#111827" font-family="Inter" font-size="14" lengthAdjust="spacing" textLength="197.2441" x="41.5763" y="166.9531">- Referential integrity checks</text><text fill="#111827" font-family="Inter" font-size="14" lengt